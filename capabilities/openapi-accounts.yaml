naftiko: 1.0.0-alpha2
info:
  label: Google AdSense Management API — Accounts
  description: 'Google AdSense Management API — Accounts. 1 operations. Lead operation: Google AdSense Management List accounts.
    Self-contained Naftiko capability covering one Google Adsense business surface.'
  tags:
  - Google Adsense
  - Accounts
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    GOOGLE_ADSENSE_API_KEY: GOOGLE_ADSENSE_API_KEY
capability:
  consumes:
  - type: http
    namespace: openapi-accounts
    baseUri: https://adsense.googleapis.com
    description: Google AdSense Management API — Accounts business capability. Self-contained, no shared references.
    resources:
    - name: v2-accounts
      path: /v2/accounts
      operations:
      - name: listaccounts
        method: GET
        description: Google AdSense Management List accounts
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: pageSize
          in: query
          type: integer
        - name: pageToken
          in: query
          type: string
    authentication:
      type: bearer
      token: '{{env.GOOGLE_ADSENSE_API_KEY}}'
  exposes:
  - type: rest
    namespace: openapi-accounts-rest
    port: 8080
    description: REST adapter for Google AdSense Management API — Accounts. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/v2/accounts
      name: v2-accounts
      description: REST surface for v2-accounts.
      operations:
      - method: GET
        name: listaccounts
        description: Google AdSense Management List accounts
        call: openapi-accounts.listaccounts
        with:
          pageSize: rest.pageSize
          pageToken: rest.pageToken
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: openapi-accounts-mcp
    port: 9090
    transport: http
    description: MCP adapter for Google AdSense Management API — Accounts. One tool per consumed operation, routed inline
      through this capability's consumes block.
    tools:
    - name: google-adsense-management-list-accounts
      description: Google AdSense Management List accounts
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: openapi-accounts.listaccounts
      with:
        pageSize: tools.pageSize
        pageToken: tools.pageToken
      outputParameters:
      - type: object
        mapping: $.
