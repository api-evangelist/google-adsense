aid: google-adsense
name: Google AdSense Management API
description: >-
  The Google AdSense Management API allows publishers to access their inventory
  and run earnings and performance reports. Publishers can manage ad clients, ad
  units, custom channels, URL channels, and access payment and policy information
  programmatically.
